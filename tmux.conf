# Friendly window bindings (reload: tmux source-file ~/.tmux.conf)

# Prefix: Ctrl+a (frees default Ctrl+b)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g mouse on

# Windows start at 1; closing a window renumbers the rest
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- Creating windows ---
# New window in the same directory as the current pane (default c, but explicit)
bind c new-window -c "#{pane_current_path}"

# Extra: like a browser new tab (prefix then Ctrl+t)
bind C-t new-window -c "#{pane_current_path}"

# Extra: prefix then Ctrl+n — easy chord for "new"
bind C-n new-window -c "#{pane_current_path}"

# --- Moving between windows ---
bind -r n next-window
bind -r p previous-window

# Prefix + number jumps to window 1–9 (0 is window 10 by default)
bind -r Tab next-window
bind -r BTab previous-window
