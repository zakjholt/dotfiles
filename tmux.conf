# Friendly window bindings (reload: tmux source-file ~/.tmux.conf)

# Prefix: Ctrl+a (frees default Ctrl+b)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g mouse on

# True color & undercurl support (Ghostty)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-ghostty:RGB"

# Windows start at 1; closing a window renumbers the rest
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Reduce escape delay for snappy feel
set -sg escape-time 10
set -g focus-events on

# --- Creating windows ---
bind c new-window -c "#{pane_current_path}"
bind C-t new-window -c "#{pane_current_path}"
bind C-n new-window -c "#{pane_current_path}"

# Splits inherit working directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# --- Moving between windows ---
bind -r n next-window
bind -r p previous-window
bind -r Tab next-window
bind -r BTab previous-window

# ─── Visual ──────────────────────────────────────────

# Status bar position & refresh
set -g status-position bottom
set -g status-interval 5

# Palette
ACCENT="colour4"
FG="colour7"
FG_DIM="colour8"
BG="default"

# Status bar base style (transparent background)
set -g status-style "fg=$FG,bg=$BG"

# Left: session name pill
set -g status-left-length 30
set -g status-left "#[fg=colour0,bg=$ACCENT,bold] #S #[fg=$ACCENT,bg=$BG,nobold] "

# Right: date + time
set -g status-right-length 40
set -g status-right "#[fg=$FG_DIM]%a %b %d  %H:%M "

# Window list centering
set -g status-justify left

# Inactive windows
setw -g window-status-format "#[fg=$FG_DIM] #I:#W "

# Active window
setw -g window-status-current-format "#[fg=$ACCENT,bold] #I:#W #[fg=$FG_DIM,nobold]"

# Window activity
setw -g monitor-activity on
set -g visual-activity off
setw -g window-status-activity-style "fg=colour3,bold"

# Pane borders
set -g pane-border-style "fg=colour8"
set -g pane-active-border-style "fg=$ACCENT"

# Message / command prompt
set -g message-style "fg=$ACCENT,bg=$BG,bold"
set -g message-command-style "fg=$FG,bg=$BG"

# Clock (prefix + t)
setw -g clock-mode-colour "$ACCENT"
